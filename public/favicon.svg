<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black background -->
  <rect width="32" height="32" rx="5" fill="#111111"/>
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="32" height="4" rx="5" fill="#E01010"/>
  <rect x="0" y="0" width="32" height="2" fill="#E01010"/>
  <!-- Red bottom accent bar -->
  <rect x="0" y="28" width="32" height="4" rx="5" fill="#E01010"/>
  <rect x="0" y="30" width="32" height="2" fill="#E01010"/>
  <!-- "S" letter in white -->
  <text x="5" y="23" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" font-style="italic" fill="white" letter-spacing="-1">S</text>
  <!-- "C" letter in red -->
  <text x="17" y="23" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" font-style="italic" fill="#E01010" letter-spacing="-1">C</text>
</svg>
